name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: source
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller gui_app.spec

      - name: Rename exe
        run: |
          mv dist/gui_app.exe "dist/Discord-Mass-Cleanup-Tool.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: source/dist/Discord-Mass-Cleanup-Tool.exe
          generate_release_notes: true
          draft: false
          prerelease: false
